<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cozy Ren Faire Cottage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="fade"></div>
<div id="game">
    <section id="outside" class="scene active">
        <div id="sky-layer"></div>
        <div id="sun"></div>
        <div id="moon"></div>
        <div class="ground">
            <img src="tree1.png" class="pixel-tree horizon-tree t1">
            <img src="tree1.png" class="pixel-tree horizon-tree t2">
            <img src="tree1.png" class="pixel-tree horizon-tree t3">
            <img src="tree1.png" class="pixel-tree horizon-tree t4">
            <img src="tree1.png" class="pixel-tree horizon-tree t5">
            <div class="cottage-wrap">
                <img src="cottage.png" class="pixel-cottage">
                <div class="smoke-chimney"></div>
            </div>
            <div class="pebble-path"></div>
        </div>
    </section>
    <section id="inside" class="scene">
        <div class="interior-bg">
            <div class="furniture-set">
                <div class="chair">🪑</div>
                <div class="table"><div id="candle" class="candle"></div></div>
                <div class="chair">🪑</div>
            </div>
            <div class="white-cat" id="cat">🐈</div>
        </div>
    </section>
</div>
<script src="script.js"></script>
</body>
</html>
