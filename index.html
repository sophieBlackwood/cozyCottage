<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cozy Ren Faire Cottage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="fade"></div>

<div id="game">
    <section id="outside" class="scene active">
        <div class="sky"></div>
        <div class="weather-layer"></div>
        <div class="ground">
            <div class="pebble-path"></div>
            <div class="cottage-container" onclick="enterHouse()">
                <img src="cottage.png" alt="Cottage" class="pixel-cottage">
                <div class="smoke-stack"></div>
            </div>
        </div>
    </section>

    <section id="inside" class="scene">
        <div class="interior-wrap">
            <div class="window-light"></div>
            <div class="fireplace-glow"></div>
            
            <div class="furniture">
                <div class="chair left">🪑</div>
                <div class="table">
                    <div id="candle" class="candle" onclick="toggleCandle()"></div>
                    <div class="books">
                        <span class="book-item" onclick="openBook('ballet')">🩰</span>
                        <span class="book-item" onclick="openBook('landscape')">🌄</span>
                    </div>
                </div>
                <div class="chair right">🪑</div>
            </div>

            <div class="cat" id="cat">🐈</div>
        </div>
    </section>

    <section id="bookWorld" class="scene">
        <div class="page-turning-wrap">
            <div id="bookContent"></div>
            <button class="close-btn" onclick="closeBook()">Return to Cottage</button>
        </div>
    </section>
</div>

<script src="script.js"></script>
</body>
</html>
