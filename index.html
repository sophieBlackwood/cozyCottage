<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Cozy Cottage</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="fade"></div>

<div id="game">

  <!-- 🌲 OUTSIDE -->
  <section id="outside" class="scene active">
    <div class="sky"></div>
    <div class="ground"></div>

    <div class="cottage" onclick="enterHouse()">
      <div class="roof"></div>
      <div class="door">🚪</div>
      <div class="window-glow"></div>
      <div class="smoke"></div>
    </div>

    <p class="hint">click the door</p>
  </section>

  <!-- 🏡 INSIDE -->
  <section id="inside" class="scene">
    <div class="room">

      <div class="fireplace"></div>

      <div class="table">
        <div id="candle" class="candle" onclick="toggleCandle()"></div>

        <div class="book" onclick="openBook('ballet')">🩰</div>
        <div class="book" onclick="openBook('landscape')">🌄</div>
        <div class="book" onclick="openBook('forest')">🌲</div>
      </div>

      <div class="cat" id="cat">🐈</div>

    </div>
  </section>

  <!-- 📖 BOOK WORLD -->
  <section id="bookWorld" class="scene">
    <div id="bookOverlay"></div>
    <div id="bookContent"></div>
    <button onclick="closeBook()">Close</button>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
