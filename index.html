<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cozy Cottage</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">

  <!-- 🌲 Cottage Scene -->
  <section id="cottage" class="scene active">
    <h1 class="title">My Little Cottage</h1>

    <div class="bookshelf">
      <div class="book" onclick="goTo('forest')">🌿</div>
      <div class="book" onclick="goTo('tea')">🍵</div>
      <div class="book" onclick="goTo('journal')">📖</div>
    </div>

    <p class="hint">Click a book to explore</p>
  </section>

  <!-- 🌿 Forest -->
  <section id="forest" class="scene">
    <h2>Whispering Forest</h2>
    <p>The trees hum softly around you...</p>
    <button onclick="goTo('cottage')">← Back to Cottage</button>
  </section>

  <!-- 🍵 Tea Room -->
  <section id="tea" class="scene">
    <h2>Tea Corner</h2>
    <p>A warm cup waits just for you.</p>
    <button onclick="goTo('cottage')">← Back to Cottage</button>
  </section>

  <!-- 📖 Journal -->
  <section id="journal" class="scene">
    <h2>Your Journal</h2>
    <textarea placeholder="Write your thoughts..."></textarea>
    <button onclick="goTo('cottage')">← Back to Cottage</button>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
